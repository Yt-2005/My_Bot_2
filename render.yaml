# render.yaml — Render.com deployment config
# Deploy as "Background Worker" (stays alive 24/7 on free tier!)

services:
  - type: worker
    name: telegram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TOKEN
        sync: false           # Set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false           # Get free key at console.groq.com
      - key: ADMIN_IDS
        sync: false
      - key: PORT
        value: 10000
    plan: free
